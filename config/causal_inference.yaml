# ==========================================
# 目标一：验证性因果推断配置
# ==========================================

# 研究假设定义
hypotheses:
  # 示例：补气活血药改善乏力
  - treatment:
      type: "herb_category"       # herb_category, single_herb, combination
      name: "补气活血药"
      definition:
        - "补气药 > 0"
        - "活血药 > 0"

    outcome:
      type: "symptom"
      name: "乏力"
      time_lag: 1                 # 检测t+1时刻的变化

    confounders:
      - age
      - gender
      - chinese_diagnosis
      - baseline_severity         # t时刻症状严重程度
      - western_medicine_history

# 倾向性评分配置
propensity_score:
  model: "logistic_regression"    # logistic_regression, random_forest, gradient_boosting
  calibration: true               # 校准
  cross_validate: true            # 交叉验证
  cv_folds: 5

# 匹配配置
matching:
  method: "nearest_neighbor"      # nearest_neighbor, optimal, genetic
  ratio: 1                        # 对照组:处理组比例
  caliper: 0.2                    # 卡尺值（标准差倍数）
  replacement: false              # 是否允许重复匹配
  balance_tolerance: 0.1          # 平衡性容忍度（标准化差异）

# 加权配置（备选）
weighting:
  method: "ipw"                   # ipw (逆概率加权), iptw, overlap_weights
  trim_threshold: 0.05            # 修剪极端权重

# 因果效应估计
ate_estimation:
  methods:
    - "difference_in_means"       # 简单均值差
    - "regression_adjustment"     # 回归调整
    - "doubly_robust"             # 双鲁棒估计

  # 置信区间
  confidence_interval:
    method: "bootstrap"           # bootstrap, asymptotic
    n_bootstrap: 1000
    alpha: 0.05                   # 95% CI

# 敏感性分析
sensitivity_analysis:
  methods:
    - "rosenbaum_bounds"          # Rosenbaum界
    - "echron"                    # E-value

# 统计检验
statistical_tests:
  continuous: "t_test"            # t_test, mann_whitney
  categorical: "chi_square"       # chi_square, fisher_exact
  balance_metric: "std_diff"      # std_diff (标准化差异), kolmogorov_smirnov

# 输出设置
output:
  report_format: "markdown"       # markdown, html, pdf
  include_plots: true
  include_tables: true
  save_matched_data: true
