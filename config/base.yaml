# 鼻咽癌因果推断项目 - 基础配置
# 此文件包含所有默认参数，实验配置可以继承并覆盖

project:
  name: "Causality-NPC"
  version: "2.0"

# 路径配置
paths:
  raw_data: "Data/raw/npc_full_with_symptoms.csv"
  outputs_root: "outputs"  # 输出根目录

# 步骤1：因果发现配置
discovery:
  # 数据处理参数
  symptom_threshold: 0.10      # 症状频率阈值
  medicine_threshold: 0.10     # 药物频率阈值（常调参数）
  diagnosis_threshold: 0.10    # 诊断频率阈值

  # PC算法参数
  alpha: 0.05                  # 显著性水平（常调参数）
  independence_test: "fisherz"
  depth: -1

  # 约束参数
  apply_constraints: true
  remove_cycles: true

# 步骤2：因果效应估计配置
effect:
  # 质量过滤
  min_correlation: 0.0
  min_sample_size: 20

  # 估计方法
  method: "logistic_ovr"

  # Bootstrap参数
  bootstrap:
    enable: true
    n_iterations: 50           # Bootstrap次数（可调参数）
    confidence_level: 0.95

# 步骤3：因果推荐配置
recommendation:
  # 推荐参数
  threshold_positive: 0.05
  threshold_negative: -0.05
  top_k: 5
  max_paths: 5
